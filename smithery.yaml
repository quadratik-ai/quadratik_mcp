startCommand:
  type: http
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "Your Quadratik API key (required for saving contacts, exporting, and managing lists)"
      backendUrl:
        type: string
        description: "URL of the Quadratik backend (leave blank to use the default)"
    required: []
  exampleConfig:
    apiKey: "your-quadratik-api-key"
  commandFunction: |
    (config) => ({
      command: "python",
      args: ["main.py"],
      env: {
        MCP_TRANSPORT: "http",
        QUADRATIK_API_KEY: config.apiKey || "",
        QUADRATIK_BACKEND_URL: config.backendUrl || "https://api.quadratik.ai",
        PORT: "8000"
      }
    })
